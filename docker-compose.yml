# OrbitCast local stack (CLAUDE.md C1, §7.1). Runs under OrbStack on Apple
# Silicon with `docker compose up`. Service-name DNS on the compose network
# (db) is used instead of host.docker.internal.
services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://orbitcast:orbitcast@db:5432/orbitcast
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: orbitcast
      POSTGRES_PASSWORD: orbitcast
      POSTGRES_DB: orbitcast
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbitcast -d orbitcast"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

volumes:
  pgdata:
