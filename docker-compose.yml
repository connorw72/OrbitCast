# OrbitCast local stack (CLAUDE.md C1, §7.1). Runs under OrbStack on Apple
# Silicon with `docker compose up`. Service-name DNS on the compose network
# (db) is used instead of host.docker.internal.
services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://orbitcast:orbitcast@db:5432/orbitcast
    volumes:
      # Read-only CelesTrak GP cache (populated by scripts/refresh_gp.py in
      # Phase 1; by the Dagster celestrak_refresh job in Phase 2). The serving
      # path only reads it.
      - ./data:/app/data:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Orchestration: webserver + daemon in one container (CLAUDE.md D4, §5.5).
  # Writes marts + the DuckDB warehouse under ./data (read-write).
  dagster:
    build:
      context: .
      dockerfile: pipelines/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - dagster_home:/app/dagster_home
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: orbitcast
      POSTGRES_PASSWORD: orbitcast
      POSTGRES_DB: orbitcast
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbitcast -d orbitcast"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

volumes:
  pgdata:
  dagster_home:
