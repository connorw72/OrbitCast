name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      # --all-packages installs every workspace member (core/api/pipelines/ml) and
      # their deps; plain `uv sync` only installs the virtual root's dev group, which
      # leaves member imports (dagster, bigquery, lightgbm, ...) unresolved.
      - run: uv sync --all-packages --dev
      - name: ruff (lint)
        run: uv run ruff check .
      - name: ruff (format check)
        run: uv run ruff format --check .
      - name: pyright
        run: uv run pyright
      - name: pytest
        run: uv run pytest -q

  build-image:
    needs: lint-type-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          platforms: linux/arm64,linux/amd64
          push: true
          tags: |
            ghcr.io/connorw72/orbitcast-api:latest
            ghcr.io/connorw72/orbitcast-api:${{ github.sha }}
